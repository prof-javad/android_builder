name: Download Kotlin Plugin JAR

on:
  workflow_dispatch:

jobs:
  download-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Download the required JAR file
        run: |
          # ما فایل را مستقیماً از مخزن رسمی Maven Central دانلود می‌کنیم
          # از curl با قابلیت دنبال کردن تغییر مسیر استفاده می‌کنیم
          curl -L -o org.jetbrains.kotlin.jvm.gradle.plugin-1.6.10.jar \
            "https://repo1.maven.org/maven2/org/jetbrains/kotlin/jvm/org.jetbrains.kotlin.jvm.gradle.plugin/1.6.10/org.jetbrains.kotlin.jvm.gradle.plugin-1.6.10.jar"
          
          # حجم فایل را نمایش می‌دهیم تا از صحت آن مطمئن شویم
          echo "Download completed. File size:"
          ls -lh org.jetbrains.kotlin.jvm.gradle.plugin-1.6.10.jar

      - name: Upload JAR file as Artifact
        uses: actions/upload-artifact@v5
        with:
          name: kotlin-jvm-plugin-jar
          path: org.jetbrains.kotlin.jvm.gradle.plugin-1.6.10.jar
