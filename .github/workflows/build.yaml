name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the builder code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - id: get-project
        name: Get project name
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone the main project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Install Node dependencies
        working-directory: ./project
        run: npm install

      - name: Fix settings.gradle (after npm install)
        working-directory: ./project/android
        run: |
          echo "=== Before fix ==="
          head -n 5 settings.gradle
          sed -i '3s|.*|apply from: new File(rootDir, "../node_modules/expo/scripts/autolinking.gradle")|' settings.gradle
          echo "=== After fix ==="
          head -n 5 settings.gradle

      - name: Build the APK with no cache
        working-directory: ./project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-build-cache --stacktrace

      # این قدم همیشه اجرا می‌شود، چه بیلد موفق باشد چه ناموفق
      - name: Upload Kotlin Plugin Cache
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kotlin-plugin-files
          path: |
            ~/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin.jvm/org.jetbrains.kotlin.jvm.gradle.plugin/1.6.10/**/*.jar
            ~/.gradle/caches/modules-2/files-2.1/org.jetbrains.kotlin.jvm/org.jetbrains.kotlin.jvm.gradle.plugin/1.6.10/**/*.pom

      - name: Upload the final APK
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: monopoly-apk
          path: ./project/**/*.apk
