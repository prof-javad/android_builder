name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the builder code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - id: get-project
        name: Get project name
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone the main project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Update Gradle and Memory Settings
        working-directory: ./project/android
        run: |
          # 1. ارتقاء نسخهٔ Gradle به 7.6.4 برای رفع باگ‌های داخلی
          sed -i 's/gradle-7.5.1-all.zip/gradle-7.6.4-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # 2. افزایش حافظهٔ اختصاصی برای Gradle Daemon (2GB)
          echo "" >> gradle.properties
          echo "# Increase memory for Gradle Daemon" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M" >> gradle.properties
          
          # 3. غیرفعال کردن بهینه‌سازی‌های آزمایشی که می‌توانند مشکل‌ساز باشند
          echo "android.disableAutomaticComponentCreation=true" >> gradle.properties
          
          echo "=== Updated gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Install Node dependencies
        working-directory: ./project
        run: npm install

      - name: Build the APK
        working-directory: ./project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload the final APK
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: monopoly-apk
          path: ./project/**/*.apk
